<!--
  Input del chat: textarea autoajustable + botón de enviar/detener.

  Comportamiento:
    - Enter envía, Shift+Enter agrega una nueva línea.
    - El textarea crece según el contenido hasta un máximo (ver autoResize en el .ts).
    - Mientras el bot está respondiendo (isThinking), el botón cambia a "detener".
-->
<form class="input-area" (submit)="handleSubmit($event)" novalidate>
  <div class="input-area__wrapper">
    <textarea
      #textarea
      class="input-area__textarea"
      [(ngModel)]="text"
      name="message"
      placeholder="Escribí tu mensaje... (Enter para enviar, Shift+Enter para nueva línea)"
      rows="1"
      [disabled]="isThinking()"
      (input)="autoResize()"
      (keydown)="handleKeyDown($event)"
      aria-label="Mensaje"
      aria-multiline="true"
      [attr.aria-disabled]="isThinking()"
    ></textarea>

    @if (isThinking()) {
      <!-- Botón "detener": visible mientras el bot está respondiendo -->
      <button
        type="button"
        class="input-area__btn input-area__btn--stop"
        (click)="stopClicked.emit()"
        aria-label="Detener respuesta"
        title="Detener"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
    } @else {
      <!-- Botón "enviar": visible cuando se puede enviar (texto no vacío) -->
      <button
        type="submit"
        class="input-area__btn input-area__btn--send"
        [disabled]="!canSend()"
        aria-label="Enviar mensaje"
        title="Enviar (Enter)"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    }
  </div>
</form>
