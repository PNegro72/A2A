<!--
  Sidebar lateral con la lista de conversaciones.
  En desktop está siempre visible; en mobile se abre/cierra y aparece sobre el chat.

  Permite:
    - Crear una conversación nueva.
    - Seleccionar/cambiar la conversación activa.
    - Renombrar (modal inline).
    - Eliminar (con confirmación).
-->
<aside class="sidebar" [class.sidebar--open]="open()" role="navigation" aria-label="Conversaciones">
  <!-- Overlay translúcido en mobile: click cierra la sidebar -->
  <div class="sidebar__overlay" (click)="closeSidebar.emit()" aria-hidden="true"></div>

  <div class="sidebar__panel">
    <!-- Header: marca + botón "Nueva conversación" -->
    <div class="sidebar__header">
      <span class="sidebar__brand">SAPE</span>
      <button
        class="sidebar__new-btn"
        (click)="newConversation.emit()"
        aria-label="Nueva conversación"
        title="Nueva conversación"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nueva
      </button>
    </div>

    <!-- Lista de conversaciones guardadas -->
    <div class="sidebar__list" role="list" aria-label="Lista de conversaciones">
      @for (conv of conversations(); track conv.id) {
        <div
          class="conv-item"
          [class.conv-item--active]="conv.id === activeId()"
          role="listitem"
        >
          <!-- Cuerpo del item: click selecciona la conversación -->
          <button
            class="conv-item__btn"
            (click)="selectConversation.emit(conv.id)"
            [attr.aria-current]="conv.id === activeId() ? 'page' : null"
          >
            <span class="conv-item__title">{{ conv.title }}</span>
            <span class="conv-item__time">{{ conv.updatedAt | relativeTime }}</span>
          </button>

          <!-- Acciones: renombrar / eliminar -->
          <div class="conv-item__actions">
            <button
              class="conv-item__action-btn"
              (click)="startRename(conv)"
              aria-label="Renombrar conversación"
              title="Renombrar"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button
              class="conv-item__action-btn conv-item__action-btn--delete"
              (click)="confirmDelete(conv.id)"
              aria-label="Eliminar conversación"
              title="Eliminar"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6"/><path d="M14 11v6"/>
                <path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>
        </div>
      }

      @if (conversations().length === 0) {
        <p class="sidebar__empty">Sin conversaciones aún.</p>
      }
    </div>
  </div>

  <!--
    Modal de renombre (inline dentro de la sidebar).
    Aparece cuando renamingConv tiene una conversación seleccionada.
    Enter confirma, Escape cancela.
  -->
  @if (renamingConv()) {
    <div class="rename-modal" role="dialog" aria-modal="true" aria-label="Renombrar conversación">
      <div class="rename-modal__backdrop" (click)="cancelRename()"></div>
      <div class="rename-modal__box">
        <h2 class="rename-modal__title">Renombrar conversación</h2>
        <input
          class="rename-modal__input"
          type="text"
          [(value)]="renameValue"
          (input)="renameValue = $any($event.target).value"
          (keydown.enter)="commitRename()"
          (keydown.escape)="cancelRename()"
          aria-label="Nuevo nombre"
          autofocus
        />
        <div class="rename-modal__actions">
          <button class="rename-modal__btn rename-modal__btn--cancel" (click)="cancelRename()">Cancelar</button>
          <button class="rename-modal__btn rename-modal__btn--ok" (click)="commitRename()">Guardar</button>
        </div>
      </div>
    </div>
  }

  <!-- Confirmación de borrado: aparece cuando deletingId tiene un id -->
  @if (deletingId()) {
    <div class="rename-modal" role="dialog" aria-modal="true" aria-label="Confirmar eliminación">
      <div class="rename-modal__backdrop" (click)="cancelDelete()"></div>
      <div class="rename-modal__box">
        <h2 class="rename-modal__title">¿Eliminar conversación?</h2>
        <p class="rename-modal__desc">Esta acción no se puede deshacer.</p>
        <div class="rename-modal__actions">
          <button class="rename-modal__btn rename-modal__btn--cancel" (click)="cancelDelete()">Cancelar</button>
          <button class="rename-modal__btn rename-modal__btn--delete" (click)="commitDelete()">Eliminar</button>
        </div>
      </div>
    </div>
  }
</aside>
